<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B1020">
  <title>History — AI or Not</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="history">
  <div class="nav-overlay" aria-hidden="true"></div>

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🧠</span><span>AI or Not</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="detector.html" class="nav-link">Detector</a></li>
        <li><a href="history.html" class="nav-link">History</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        <li><a href="settings.html" class="nav-link">Settings</a></li>
      </ul>
      <div class="nav-actions">
        <button class="hamburger" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Scan History</h1>
      <p>Review your previous analyses. All data is stored locally on your device.</p>
    </div>
  </header>

  <main class="section" style="padding-top: 0;">
    <div class="container">
      <div id="historyStats" class="history-stats" aria-label="History statistics"></div>

      <div class="history-toolbar">
        <input type="search" id="historySearch" class="history-search" placeholder="Search by prediction, filename, or date..." aria-label="Search history">
        <button type="button" id="clearAllBtn" class="btn btn-ghost" aria-label="Clear all history">Clear All</button>
      </div>

      <div id="historyEmpty" class="empty-state glass-card" hidden>
        <div class="empty-state-icon" aria-hidden="true">📭</div>
        <h3>No scans yet</h3>
        <p>Upload an image in the detector to start building your history.</p>
        <a href="detector.html" class="btn btn-primary btn-ripple" style="margin-top: 1rem;">Analyze Image</a>
      </div>

      <div id="historyList" class="history-list" role="list" aria-label="Scan history"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border: none; padding-top: 0;">
        <span>&copy; 2026 AI or Not</span>
      </div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
